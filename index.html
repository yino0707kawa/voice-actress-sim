<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>新人女声优养成模拟器</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #fff7fb;
      --ink: #2b2530;
      --muted: #756a78;
      --panel: #ffffff;
      --panel-2: #fff0f6;
      --line: #ead7e4;
      --accent: #e65f9d;
      --accent-2: #56b6c2;
      --gold: #d89b2b;
      --good: #37a66a;
      --bad: #d64f62;
      --warn: #d58a2f;
      --shadow: rgba(106, 59, 91, 0.16);
      font-family: "Segoe UI", "Microsoft YaHei", system-ui, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        linear-gradient(90deg, rgba(230, 95, 157, .08) 1px, transparent 1px),
        linear-gradient(rgba(86, 182, 194, .08) 1px, transparent 1px),
        radial-gradient(circle at 18% 8%, rgba(255, 211, 232, .95), transparent 22rem),
        radial-gradient(circle at 82% 10%, rgba(207, 244, 248, .85), transparent 24rem),
        var(--bg);
      background-size: 28px 28px, 28px 28px, auto, auto, auto;
    }

    button {
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px 12px;
      background: var(--panel);
      color: var(--ink);
      font: inherit;
      cursor: pointer;
      box-shadow: 0 6px 14px rgba(106, 59, 91, .08);
      transition: transform .12s ease, border-color .12s ease, background .12s ease;
    }

    button:hover:not(:disabled), button:focus-visible {
      border-color: var(--accent);
      background: #fff7fb;
      outline: none;
    }

    button:active:not(:disabled) { transform: translateY(1px); }
    button:disabled { color: #b9adb9; cursor: not-allowed; box-shadow: none; }

    .app {
      width: min(1220px, calc(100vw - 28px));
      margin: 0 auto;
      padding: 24px 0 32px;
    }

    .top {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 16px;
      align-items: end;
      margin-bottom: 16px;
    }

    .brand {
      display: flex;
      gap: 14px;
      align-items: center;
      min-width: 0;
    }

    .logo {
      width: 58px;
      height: 58px;
      flex: 0 0 auto;
      filter: drop-shadow(0 10px 18px var(--shadow));
    }

    h1 {
      margin: 0 0 5px;
      font-size: clamp(29px, 4vw, 48px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.45;
    }

    .toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .layout {
      display: grid;
      grid-template-columns: 294px minmax(0, 1fr) 310px;
      gap: 14px;
      align-items: start;
    }

    .panel {
      background: rgba(255, 255, 255, .94);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 18px 38px var(--shadow);
      overflow: hidden;
    }

    .panel h2 {
      margin: 0;
      padding: 14px 14px 0;
      font-size: 16px;
      letter-spacing: 0;
    }

    .hero {
      min-height: 650px;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    .stage {
      min-height: 166px;
      border-bottom: 1px solid var(--line);
      background:
        linear-gradient(180deg, rgba(230, 95, 157, .14), rgba(86, 182, 194, .10)),
        #fffafd;
      position: relative;
      overflow: hidden;
      padding: 18px;
    }

    .stage svg {
      width: 100%;
      max-height: 132px;
      display: block;
    }

    .story {
      padding: 18px 20px;
      overflow: auto;
    }

    .weekline {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      color: var(--accent);
      font-size: 13px;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .story h2 {
      padding: 0;
      margin: 0 0 10px;
      font-size: 24px;
    }

    .story p {
      margin: 0 0 12px;
      color: #514853;
      line-height: 1.76;
    }

    .choices {
      border-top: 1px solid var(--line);
      padding: 14px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      background: #fffafd;
    }

    .choice {
      text-align: left;
      min-height: 78px;
    }

    .choice strong {
      display: block;
      margin-bottom: 4px;
    }

    .choice small {
      color: var(--muted);
      line-height: 1.38;
    }

    .stats {
      padding: 10px 14px 14px;
      display: grid;
      gap: 10px;
    }

    .stat {
      display: grid;
      grid-template-columns: 76px minmax(0, 1fr) 42px;
      gap: 8px;
      align-items: center;
      font-size: 14px;
    }

    .bar {
      height: 10px;
      overflow: hidden;
      background: #f8edf4;
      border: 1px solid var(--line);
      border-radius: 999px;
    }

    .fill {
      display: block;
      height: 100%;
      width: 50%;
      border-radius: inherit;
      background: var(--accent-2);
      transition: width .18s ease, background .18s ease;
    }

    .value {
      color: var(--muted);
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .meta {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      padding: 0 14px 14px;
    }

    .meta div {
      min-height: 62px;
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
    }

    .meta span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 5px;
    }

    .meta strong {
      font-size: 20px;
      font-variant-numeric: tabular-nums;
    }

    .side {
      display: grid;
      gap: 14px;
    }

    .log, .list {
      padding: 12px 14px 14px;
      display: grid;
      gap: 9px;
    }

    .log {
      max-height: 290px;
      overflow: auto;
    }

    .log p {
      margin: 0;
      padding-left: 9px;
      border-left: 2px solid #f0bdd6;
      color: #5e5360;
      font-size: 13px;
      line-height: 1.48;
    }

    .item {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 9px 0;
      border-bottom: 1px solid #f1dfe9;
      color: #514853;
    }

    .item:last-child { border-bottom: 0; }

    .tag {
      color: var(--muted);
      font-size: 13px;
      text-align: right;
      white-space: nowrap;
    }

    .ending {
      margin-top: 14px;
      padding: 14px;
      border: 1px solid rgba(230, 95, 157, .45);
      border-radius: 8px;
      background: rgba(255, 240, 246, .9);
    }

    .notice {
      margin: 8px 14px 14px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    @media (max-width: 1000px) {
      .layout { grid-template-columns: 1fr; }
      .side { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 700px) {
      .app { width: min(100vw - 18px, 1220px); padding-top: 14px; }
      .top { grid-template-columns: 1fr; align-items: start; }
      .toolbar { justify-content: flex-start; }
      .choices, .side { grid-template-columns: 1fr; }
      .hero { min-height: auto; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="top">
      <div class="brand">
        <svg class="logo" viewBox="0 0 64 64" role="img" aria-label="麦克风与耳机">
          <circle cx="32" cy="32" r="30" fill="#fff0f6" stroke="#e65f9d" stroke-width="2"/>

          <rect x="25" y="18" width="14" height="28" rx="7" fill="#e65f9d"/>
          <path d="M22 32v4a10 10 0 0 0 20 0v-4" fill="none" stroke="#2b2530" stroke-width="3" stroke-linecap="round"/>

      </div>
      <div class="toolbar">

    </header>

    <section class="layout">
      <aside class="panel">
        <h2>个人状态</h2>
        <div class="stats" id="stats"></div>
        <div class="meta">
          <div><span>周数</span><strong id="weekText">1 / 48</strong></div>
          <div><span>粉丝</span><strong id="fansText">0</strong></div>

          <div><span>炎上风险</span><strong id="riskText">低</strong></div>
        </div>
      </aside>

      <section class="panel hero">
        <div class="stage" aria-hidden="true">
          <svg viewBox="0 0 780 160" preserveAspectRatio="none">
            <rect width="780" height="160" fill="#fffafd"/>
            <path d="M0 118 C120 92 235 132 360 104 S610 92 780 120 V160 H0z" fill="#f7e5ef"/>
            <rect x="74" y="46" width="168" height="78" rx="8" fill="#ffffff" stroke="#ead7e4" stroke-width="3"/>
            <path d="M92 64h132M92 82h98M92 100h118" stroke="#e65f9d" stroke-width="5" stroke-linecap="round" opacity=".55"/>
            <rect x="292" y="32" width="196" height="110" rx="12" fill="#fff" stroke="#ead7e4" stroke-width="3"/>
            <circle cx="330" cy="72" r="22" fill="#ffd3e8"/>
            <rect x="365" y="57" width="88" height="12" rx="6" fill="#56b6c2" opacity=".75"/>
            <rect x="365" y="82" width="66" height="12" rx="6" fill="#e65f9d" opacity=".7"/>
            <path d="M565 114h104l-18-58h-68z" fill="#ffffff" stroke="#ead7e4" stroke-width="3"/>
            <rect x="598" y="36" width="36" height="58" rx="18" fill="#e65f9d"/>
            <path d="M588 68v10a28 28 0 0 0 56 0V68" fill="none" stroke="#2b2530" stroke-width="4" stroke-linecap="round"/>
            <path d="M616 106v26M596 132h40" stroke="#2b2530" stroke-width="4" stroke-linecap="round"/>
            <text x="318" y="124" fill="#756a78" font-size="18">AUDITION</text>
          </svg>
        </div>
        <article class="story">
          <div class="weekline"><span id="phaseText"></span><span id="moodText"></span></div>
          <h2 id="titleText"></h2>
          <div id="storyText"></div>
        </article>
        <div class="choices" id="choices"></div>
      </section>

      <aside class="side">
        <section class="panel">
          <h2>活动记录</h2>
          <div class="log" id="log"></div>
        </section>
        <section class="panel">
          <h2>关系与履历</h2>
          <div class="list" id="roles"></div>
          <p class="notice">恋爱线对象是同期女声优「雾岛凛」。好感度和关系阶段会影响部分事件与结局。</p>
        </section>
      </aside>
    </section>
  </main>

  <script>

    const schedules = [
      { label: "台词课狂练", hint: "演技 +9，声线 +4，体力 -8，资金 -4", effect: { acting: 9, voice: 4, stamina: -8, money: -4 }, cost: { money: 4 }, log: "你对着剧本练了三小时哭戏。隔壁练习室以为水管爆了。" },

      },
      {
        title: "漫展舞台突袭",
        text: ["原定嘉宾堵在路上，主持人看向你：能不能撑十分钟？", "台下全是熟悉作品三秒能接梗的观众。这里是舞台，也是大型宅力考试。"],
        choices: [
          { label: "即兴主持", hint: "谈吐 +8，粉丝 +320，体力 -8", effect: { talk: 8, fans: 320, stamina: -8 }, log: "你撑满了十二分钟。台下甚至开始喊安可。" },
          { label: "和凛现场配名场面", hint: "演技 +5，声线 +5，好感 +6，粉丝 +260", effect: { acting: 5, voice: 5, affection: 6, fans: 260 }, log: "你们的即兴配音被上传，标题是“同期女声优默契过头了吧”。" },
          { label: "把锅推给主持人", hint: "心理 +4，事务所评价 -6", effect: { mental: 4, agency: -6 }, log: "你成功脱身，也成功被经纪人记了一笔。" }
        ]
      }
    ];

    const romanceEvents = [
      {
        title: "雨夜共伞",
        text: ["夜间录音结束，雨把事务所门口变成了小型水属性副本。", "雾岛凛站在你旁边，举起一把明显不够两个人用的伞。"],
        choices: [
          { label: "一起挤回车站", hint: "好感 +12，心理 +6", effect: { affection: 12, mental: 6 }, log: "你们一路肩膀碰肩膀。凛说雨声很吵，但你听见了她笑。" },
          { label: "把伞让给她", hint: "好感 +8，体力 -5", effect: { affection: 8, stamina: -5 }, log: "凛第二天把洗好的毛巾塞给你，语气凶得像在配傲娇角色。" },
          { label: "叫经纪人来接", hint: "炎上 -2，事务所评价 +2", effect: { flame: -2, agency: 2 }, log: "经纪人来了，车里安静得像试音失败后的休息室。" }
        ]
      },
      {
        title: "双人广播企划",
        text: ["事务所安排你和凛做一期双人广播。台本写着“自然互动”，这四个字看起来比绕口令还难。", "开播前，凛小声问：我们平时那样就可以吗？"],
        choices: [
          { label: "照平时聊天", hint: "粉丝 +420，好感 +8，炎上 +5", effect: { fans: 420, affection: 8, flame: 5 }, log: "你们笑到导播提醒控时。节目剪辑区出现了新的热门标签。" },
          { label: "认真做节目", hint: "谈吐 +8，粉丝 +220，事务所评价 +4", effect: { talk: 8, fans: 220, agency: 4 }, log: "节目非常稳。凛下播后说，偶尔稳一点也不错。" },
          { label: "偷偷念粉丝来信", hint: "好感 +10，心理 +5，炎上 +3", effect: { affection: 10, mental: 5, flame: 3 }, log: "读到“请永远一起配音”时，你们同时卡壳。导播笑得很坏。" }
        ]
      },
      {
        title: "天台告白练习",
        text: ["新作里有一段告白戏，你和凛被要求提前找感觉。", "天台风很轻，台词却突然变得不像台词。"],
        choices: [
          { label: "照着台本说完", hint: "演技 +8，好感 +5", effect: { acting: 8, affection: 5 }, log: "你完整说完台词。凛鼓掌，但眼睛一直没有移开。" },
          { label: "把真心混进去", hint: "好感 +16，心理 +6，关系可能推进", effect: { affection: 16, mental: 6 }, romanceStep: 1, log: "你说完后，两个人都安静了。凛轻声说：这句不像演的。" },
          { label: "用玩笑带过去", hint: "谈吐 +5，好感 +3", effect: { talk: 5, affection: 3 }, log: "你把气氛转成吐槽大会。凛笑了，但那句台词留在风里。" }
        ]
      },
      {
        title: "关系确认",
        text: ["收录结束后，凛把你留在空棚。她的手指捏着台本边角，像在和全世界的延迟战斗。", "她问：如果不是角色，如果是我本人说喜欢你，你会怎么接？"],
        choices: [
          { label: "认真回应她", hint: "关系：恋人，好感 +12，心理 +10", effect: { affection: 12, mental: 10 }, setRelationship: 2, log: "你握住她的手。没有 BGM，没有聚光灯，但这句台词你一辈子不会忘。" },
          { label: "说还想慢慢确认", hint: "关系：暧昧，好感 +6，炎上 -2", effect: { affection: 6, flame: -2 }, setRelationship: 1, log: "凛点点头，说她可以等。你突然觉得这一行的等待也没那么可怕。" },
          { label: "先专注事业", hint: "事务所评价 +5，心理 -4，好感 -6", effect: { agency: 5, mental: -4, affection: -6 }, log: "你把心动收进台本夹。凛笑着说理解，但那天之后你们少聊了很多。" }
        ]
      }
    ];

    let state = migrateSave(loadGameData()) || structuredClone(baseState);

    const $ = (selector) => document.querySelector(selector);
    const nodes = {
      stats: $("#stats"),
      weekText: $("#weekText"),
      fansText: $("#fansText"),
      moneyText: $("#moneyText"),
      riskText: $("#riskText"),
      phaseText: $("#phaseText"),
      moodText: $("#moodText"),
      titleText: $("#titleText"),
      storyText: $("#storyText"),
      choices: $("#choices"),
      log: $("#log"),
      roles: $("#roles"),
      saveBtn: $("#saveBtn"),
      loadBtn: $("#loadBtn"),
      newBtn: $("#newBtn")
    };

    function clamp(value, max = 100) {
      return Math.max(0, Math.min(max, Math.round(value)));
    }

    function applyEffect(effect = {}) {
      for (const [key, value] of Object.entries(effect)) {
        if (statDefs.some(([, stat]) => stat === key) || key === "agency" || key === "flame") {
          state[key] = clamp((state[key] || 0) + value);
        } else if (key === "fans") {
          state.fans = Math.max(0, state.fans + value);
        } else {
          state[key] += value;
        }
      }
      updateRelationship();
    }

    function hasCost(cost = {}) {
      return Object.entries(cost).every(([key, value]) => state[key] >= value);
    }

    function addLog(text) {
      state.log.unshift(`第 ${state.week} 周：${text}`);
      state.log = state.log.slice(0, 18);
    }

    function updateRelationship() {
      if (state.relationship < 1 && state.affection >= 45) state.relationship = 1;
      if (state.relationship < 2 && state.affection >= 82) state.relationship = 1;
    }

    function weeklyDrift() {
      state.stamina = clamp(state.stamina - 3);
      state.mental = clamp(state.mental - (state.flame > 45 ? 7 : 3) + (state.relationship === 2 ? 2 : 0));
      state.agency = clamp(state.agency + (state.roles.length > 2 ? 2 : 0));
      state.fans = Math.max(0, Math.round(state.fans + state.roles.length * 18 - (state.flame > 60 ? 90 : 0)));
      if (state.week % 4 === 0) {
        const income = 8 + state.roles.length * 4 + Math.floor(state.fans / 900);
        state.money += income;
        addLog(`月末结算到账 ${income}。经纪人说这叫成长曲线，不叫穷。`);
      }
    }

    function chooseSchedule(choice) {
      if (state.ending || !hasCost(choice.cost)) return;
      applyEffect(choice.effect);
      addLog(choice.log);
      nextWeek();
    }

    function chooseEvent(choice) {
      if (state.ending || !hasCost(choice.cost)) return;
      applyEffect(choice.effect);
      if (choice.romanceStep && state.affection >= 65) state.relationship = Math.max(state.relationship, choice.romanceStep);
      if (choice.setRelationship !== undefined) state.relationship = choice.setRelationship;
      addLog(choice.log);
      nextWeek();
    }

    function chooseAudition(audition, choice) {
      if (state.ending) return;
      applyEffect(choice.effect);
      if (choice.mod <= -999) {
        addLog("你选择暂时不参加试音。机会还有，嗓子和心跳都只有一副。");
        nextWeek();
        return;
      }
      const base = Object.entries(audition.req).reduce((sum, [key, req]) => sum + (state[key] - req), 0);
      const chemistry = audition.id === "idol" ? Math.floor(state.affection / 8) : 0;
      const score = base + choice.mod + Math.floor(state.agency / 10) + chemistry;
      if (score >= 0) {
        if (!state.roles.includes(audition.success)) state.roles.push(audition.success);
        const fanGain = audition.id === "idol" ? 1000 : 520;
        applyEffect({ fans: fanGain, agency: 10, mental: 4, affection: audition.id === "idol" ? 6 : 0 });
        addLog(`试音成功！你拿到了「${audition.success}」。粉丝数开始出现你不敢数的增长。`);
      } else {
        applyEffect({ mental: -8, agency: -3 });
        addLog(audition.failLog);
      }
      nextWeek();
    }

    function nextWeek() {
      weeklyDrift();
      state.week += 1;
      evaluateEnding();
      saveGame(false);
      render();
    }

    function evaluateEnding() {
      if (state.mental <= 0) {
        state.ending = { title: "休养结局", text: "你按下暂停键。事务所公告写得很温柔：为了以更好的状态再次见面。" };
      } else if (state.stamina <= 0) {
        state.ending = { title: "过劳倒下", text: "你在录音棚沙发上睡到第二天下午。经纪人终于把日程表撕掉了一半。" };
      } else if (state.flame >= 100) {
        state.ending = { title: "传说级炎上", text: "热搜、切片、长文分析同时抵达。你学会了互联网不是录音棚，它不会喊停。" };
      } else if (state.week > MAX_WEEK) {
        if (state.relationship === 2 && state.roles.some(role => role.includes("双人")) && state.fans >= 7000) {
          state.ending = { title: "双声线恋人结局", text: "你和凛以双人组合出道，粉丝说你们的默契像台本写好的。只有你们知道，那些心跳没有台本。" };
        } else if (state.relationship === 2 && state.affection >= 82) {
          state.ending = { title: "秘密恋人结局", text: "事业还在爬坡，但每个深夜收录后，都有人和你一起走到车站。你终于不再一个人面对聚光灯。" };
        } else if (state.roles.some(role => role.includes("双人")) && state.fans >= 8000) {
          state.ending = { title: "奇迹主役结局", text: "动画播出后，你的名字和角色一起被记住。你终于有了第一句代表台词。" };
        } else if (state.singing >= 70 && state.talk >= 62 && state.fans >= 6000) {
          state.ending = { title: "偶像声优路线", text: "你站上小型 Live 舞台，台下荧光棒像一片会呼吸的星海。" };
        } else if (state.acting >= 76 && state.roles.length >= 3) {
          state.ending = { title: "实力派配角路线", text: "你还不是最大牌的名字，但监督们开始说：这个角色可以找她。" };
        } else if (state.talk >= 72 && state.fans >= 4500) {
          state.ending = { title: "广播主持路线", text: "你的节目有了固定听众。大家每周来听你笑，也听你慢慢变强。" };
        } else {
          state.ending = { title: "稳步前进结局", text: "一年过去，你仍在新人名单里，但已经不再是没有名字的新人。" };
        }
      }
    }

    function currentMode() {
      if (state.ending) return { type: "ending" };
      if ([7, 14, 27, 36].includes(state.week)) {
        const index = [7, 14, 27, 36].indexOf(state.week);
        return { type: "romance", data: romanceEvents[index] };
      }
      if (state.week % 8 === 0) return { type: "audition", data: auditions[(state.week / 8 - 1) % auditions.length] };
      if (state.week % 5 === 0) return { type: "event", data: events[(state.week / 5 - 1) % events.length] };
      return { type: "schedule" };
    }

    function riskLabel() {
      if (state.flame >= 75) return "危险";
      if (state.flame >= 45) return "偏高";
      if (state.flame >= 20) return "有点热";
      return "低";
    }

    function relationshipLabel() {
      if (state.relationship === 2) return "恋人";
      if (state.relationship === 1) return "暧昧";
      if (state.affection >= 35) return "在意";
      return "同期";
    }

    function moodLabel() {
      if (state.relationship === 2) return "关系：恋人";
      if (state.mental < 30) return "心态：快碎了";
      if (state.stamina < 30) return "状态：电量不足";
      if (state.flame > 55) return "网络：火药味";
      if (state.affection > 60) return "关系：空气很甜";
      return "状态：还活着，很伟大";
    }

    function barColor(value) {
      if (value < 25) return "var(--bad)";
      if (value < 45) return "var(--warn)";
      if (value > 75) return "var(--good)";
      return "var(--accent-2)";
    }

    function renderStats() {
      nodes.stats.innerHTML = statDefs.map(([label, key]) => `
        <div class="stat">
          <span>${label}</span>
          <span class="bar"><span class="fill" style="width:${state[key]}%; background:${barColor(state[key])}"></span></span>
          <span class="value">${state[key]}</span>
        </div>
      `).join("");
      nodes.weekText.textContent = `${Math.min(state.week, MAX_WEEK)} / ${MAX_WEEK}`;
      nodes.fansText.textContent = shortNum(state.fans);
      nodes.moneyText.textContent = state.money;
      nodes.riskText.textContent = riskLabel();
    }

    function renderStory() {
      const mode = currentMode();
      nodes.phaseText.textContent = state.ending ? "年度结算" : `第 ${state.week} 周`;
      nodes.moodText.textContent = moodLabel();
      if (state.ending) {
        nodes.titleText.textContent = state.ending.title;
        nodes.storyText.innerHTML = `
          <p>${state.ending.text}</p>
          <div class="ending">
            <p>最终数据：粉丝 ${state.fans}，履历 ${state.roles.length} 个，演技 ${state.acting}，声线 ${state.voice}，好感 ${state.affection}，关系 ${relationshipLabel()}，炎上风险 ${state.flame}。</p>
          </div>
        `;
        nodes.choices.innerHTML = `<button class="choice" type="button" onclick="newGame()"><strong>重新开始</strong><small>带着这次的心跳，再开一条新人路线。</small></button>`;
        return;
      }
      if (mode.type === "audition") renderAudition(mode.data);
      if (mode.type === "event") renderEvent(mode.data);
      if (mode.type === "romance") renderRomance(mode.data);
      if (mode.type === "schedule") renderSchedule();
    }

    function renderSchedule() {
      nodes.titleText.textContent = "本周日程安排";
      nodes.storyText.innerHTML = `
        <p>经纪人把白板推到你面前。本周没有强制试音，是自由安排的宝贵时间。</p>
        <p>你可以练功、营业、补番、休息，也可以去找雾岛凛。事业和心动都不会自己升级。</p>
      `;
      nodes.choices.innerHTML = schedules.map((choice, index) => {
        const disabled = hasCost(choice.cost) ? "" : "disabled";
        const hint = hasCost(choice.cost) ? choice.hint : "资源不足，接下来要考虑打工了";
        return `<button class="choice" ${disabled} onclick="chooseSchedule(schedules[${index}])"><strong>${choice.label}</strong><small>${hint}</small></button>`;
      }).join("");
    }

    function renderEvent(event) {
      nodes.titleText.textContent = event.title;
      nodes.storyText.innerHTML = event.text.map(line => `<p>${line}</p>`).join("");
      nodes.choices.innerHTML = event.choices.map((choice, index) => `
        <button class="choice" ${hasCost(choice.cost) ? "" : "disabled"} onclick="chooseEvent(events[(state.week / 5 - 1) % events.length].choices[${index}])"><strong>${choice.label}</strong><small>${hasCost(choice.cost) ? choice.hint : "资金不足"}</small></button>
      `).join("");
    }

    function renderRomance(event) {
      nodes.titleText.textContent = event.title;
      nodes.storyText.innerHTML = event.text.map(line => `<p>${line}</p>`).join("");
      nodes.choices.innerHTML = event.choices.map((choice, index) => {
        const eventIndex = [7, 14, 27, 36].indexOf(state.week);
        return `<button class="choice" ${hasCost(choice.cost) ? "" : "disabled"} onclick="chooseEvent(romanceEvents[${eventIndex}].choices[${index}])"><strong>${choice.label}</strong><small>${hasCost(choice.cost) ? choice.hint : "资金不足"}</small></button>`;
      }).join("");
    }

    function renderAudition(audition) {
      nodes.titleText.textContent = audition.title;
      nodes.storyText.innerHTML = `
        <p>${audition.text}</p>
        <p>参考门槛：${Object.entries(audition.req).map(([key, value]) => `${labelOf(key)} ${value}`).join("，")}。</p>
      `;
      nodes.choices.innerHTML = audition.choices.map((choice, index) => `
        <button class="choice" onclick="chooseAudition(auditions[(state.week / 8 - 1) % auditions.length], auditions[(state.week / 8 - 1) % auditions.length].choices[${index}])"><strong>${choice.label}</strong><small>${choice.hint}</small></button>
      `).join("");
    }

    function renderSide() {
      const relationship = `
        <div class="item"><span>雾岛凛</span><span class="tag">${relationshipLabel()} · 好感 ${state.affection}</span></div>
      `;
      const roles = state.roles.length
        ? state.roles.map(role => `<div class="item"><span>${role}</span><span class="tag">出演</span></div>`).join("")
        : `<div class="item"><span>还没有正式角色</span><span class="tag">新人</span></div>`;
      nodes.log.innerHTML = state.log.map(item => `<p>${item}</p>`).join("");
      nodes.roles.innerHTML = relationship + roles;
    }

    function render() {
      renderStats();
      renderStory();
      renderSide();
    }

    function labelOf(key) {
      const found = statDefs.find(([, stat]) => stat === key);
      return found ? found[0] : key;
    }

    function shortNum(value) {
      if (value >= 10000) return `${(value / 10000).toFixed(1)}万`;
      return String(value);
    }

    function saveGame(show = true) {
      localStorage.setItem(SAVE_KEY, JSON.stringify(state));
      if (show) {
        addLog("进度已保存。明天的你、以及明天的凛，都会感谢今天没有手滑的你。");
        render();
      }
    }

    function loadGameData() {
      const raw = localStorage.getItem(SAVE_KEY) || localStorage.getItem("voice-actress-sim-v1");
      if (!raw) return null;
      try {
        return JSON.parse(raw);
      } catch {
        return null;
      }
    }

    function migrateSave(saved) {
      if (!saved) return null;
      return {
        ...structuredClone(baseState),
        ...saved,
        affection: saved.affection ?? 12,
        relationship: saved.relationship ?? 0,
        log: saved.log?.length ? saved.log : structuredClone(baseState.log)
      };
    }

    function loadGame() {
      const saved = migrateSave(loadGameData());
      if (saved) {
        state = saved;
        addLog("读取了上次的进度。台本还在，人生也还在，凛的未读消息也还在。");
      } else {
        addLog("没有找到存档。看来只能从新人重新开始了。");
      }
      render();
    }

    function newGame() {
      state = structuredClone(baseState);
      localStorage.removeItem(SAVE_KEY);
      render();
    }

    nodes.saveBtn.addEventListener("click", () => saveGame(true));
    nodes.loadBtn.addEventListener("click", loadGame);
    nodes.newBtn.addEventListener("click", newGame);
    render();
  </script>
</body>
</html>
